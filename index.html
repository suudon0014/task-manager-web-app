<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク管理アプリ</title>
  
  <!-- CSSの読み込み -->
  <link rel="stylesheet" href="style.css">
  
  <!-- アイコン用 (FontAwesome) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <h1>タスク管理</h1>
    
    <!-- ▼ 認証（ログイン・新規登録）セクション ▼ -->
    <div id="auth-section">
      <form id="auth-form">
        <input type="email" id="auth-email" placeholder="メールアドレス" required style="width: 100%; margin-bottom: 10px; box-sizing: border-box;">
        <input type="password" id="auth-password" placeholder="パスワード(6文字以上)" required style="width: 100%; margin-bottom: 10px; box-sizing: border-box;">
        <div style="display: flex; gap: 10px;">
          <button type="button" id="btn-login" style="flex: 1;">ログイン</button>
          <button type="button" id="btn-signup" style="flex: 1; background-color: #6c757d; color: white; border: none;">新規登録</button>
        </div>
      </form>
    </div>

    <!-- ▼ タスク管理セクション（初期状態は非表示） ▼ -->
    <div id="task-section" style="display: none;">
      <!-- ユーザー情報とログアウトボタン -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span id="user-info" style="font-size: 0.8rem; color: #666;"></span>
        <button id="btn-logout" style="font-size: 0.8rem; padding: 4px 8px; background-color: #dc3545; color: white; border: none; border-radius: 4px;">ログアウト</button>
      </div>

      <!-- 日付ナビゲーション -->
      <div id="date-navigation" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px;">
        <button id="btn-prev-day" class="date-nav-btn"><i class="fas fa-caret-left"></i></button>
        <div style="display: flex; align-items: center; gap: 8px; cursor: pointer;" id="btn-calendar">
          <i class="far fa-calendar-alt"></i>
          <span id="current-date-display" style="font-weight: bold; font-size: 1.1rem;"></span>
        </div>
        <button id="btn-next-day" class="date-nav-btn"><i class="fas fa-caret-right"></i></button>
        <input type="date" id="date-picker" style="display: none;">
      </div>

      <!-- タスク追加フォーム -->
      <form id="task-form">
        <input type="text" id="task-title" placeholder="新しいタスクを入力" required>
        <button type="submit">追加</button>
      </form>
      
      <!-- タスク一覧表示領域 -->
      <ul id="task-list"></ul>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- SortableJS (ドラッグ＆ドロップ用) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <!-- メインスクリプト -->
  <script src="app.js"></script>
</body>
</html>
